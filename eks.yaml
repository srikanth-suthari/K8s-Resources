apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
    name: roboshop
    region: us-east-1
managedNodeGroups:
  - name: roboshop

    # type of instances
    instanceTypes: ["m5.large", "c3.large","c4.large","c5.large"]
    desiredCapacity: 3 #  by default this value is 3
    spot: true  # Here we are using spot instances for our practice purpose