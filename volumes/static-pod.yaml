# I tried attaching the same volume with two pod and this is the second pod.
# This test was successful, i was able to get the contents which were created by the nginx pod
apiVersion: v1
kind: Pod
metadata:
  name: static-pod
spec:
  containers:
    - name: almalinux
      image: ubuntu
      command: ["sleep", "10000"]
      volumeMounts:
        - name: static-vol
          mountPath: /mnt/data
  volumes:
    - name: static-vol
      persistentVolumeClaim:
        claimName: ebs-static-pvc
  nodeSelector:
    topology.ebs.csi.aws.com/zone: ap-south-2a