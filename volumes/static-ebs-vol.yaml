apiVersion: v1
kind: PersistentVolume
metadata:
  name: static-vol
spec:
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain   # does not delete the data even after the pod is terminated or detached
  capacity:
    storage: 15Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-0447b3f0482d10906
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: static-pvc
spec:
  accessMode:
    - ReadWriteOnce
  volumeName: static-vol
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
