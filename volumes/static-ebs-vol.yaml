apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static-pv
spec:
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain   # does not delete the data even after the pod is terminated or detached
  capacity:
    storage: 20Gi
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-064cb68c14853d9ce
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static-pvc
spec:
  storageClassName: ""
  volumeName: ebs-static-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: ebs-static-pod
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: static-vol
      mountPath: /usr/share/nginx/html
  volumes:
  - name: static-vol
    persistentVolumeClaim:
      claimName: ebs-static-pvc
  nodeAffinity:
    topology.kubernetes.io/zone: ap-south-2a